<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudGrid Test Harness</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="CloudComponents.Grid.Demo.styles.css" />
</head>

<body>
    <div id="app">
        <div class="app-loading">Loading CloudGrid demo…</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script>
        window.cloudGridDemo = {
            downloadTextFile: function (fileName, content, contentType) {
                const blob = new Blob([content], { type: contentType || 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const anchor = document.createElement('a');
                anchor.href = url;
                anchor.download = fileName;
                document.body.appendChild(anchor);
                anchor.click();
                anchor.remove();
                URL.revokeObjectURL(url);
            }
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
