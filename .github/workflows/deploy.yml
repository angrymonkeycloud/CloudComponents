name: Deploy Demo

on:
  push:
    branches:
      - main
    paths:
      - 'CloudComponents.Demo/**'
      - 'CloudComponents.Grid/**'
      - 'CloudComponents.VideoPlayer/**'
      - 'CloudComponents.Maps/**'
      - 'CloudComponents.Maps.Web/**'
      - 'CloudComponents.Icons/**'
      - 'Components/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish demo
        run: dotnet publish CloudComponents.Demo/CloudComponents.Demo.csproj -c Release -o publish

      - name: Prepare site
        shell: bash
        run: |
          cp -r publish/wwwroot/. site/

          # Fix base href for GitHub Pages subdirectory
          sed -i 's|<base href="/" />|<base href="/CloudComponents/" />|g' site/index.html

          # SPA fallback: copy index.html as 404.html so deep links work
          cp site/index.html site/404.html

          # GitHub Pages needs a .nojekyll to serve files starting with _
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
