name: Deploy Demo

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'CloudComponents.Demo/**'
      - 'CloudComponents.Grid/**'
      - 'CloudComponents.VideoPlayer/**'
      - 'CloudComponents.Maps/**'
      - 'CloudComponents.Maps.Web/**'
      - 'CloudComponents.Icons/**'
      - 'Components/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish demo
        run: dotnet publish CloudComponents.Demo/CloudComponents.Demo.csproj -c Release -o publish

      - name: Prepare site
        shell: bash
        run: |
          mkdir -p site
          cp -r publish/wwwroot/. site/

          # Fix base href for GitHub Pages subdirectory
          sed -i 's|<base href="/" />|<base href="/CloudComponents/" />|g' site/index.html

          # SPA fallback: copy index.html as 404.html so deep links work
          cp site/index.html site/404.html

          # GitHub Pages needs a .nojekyll to serve files starting with _
          touch site/.nojekyll

      - name: Publish to gh-pages branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf /tmp/gh-pages
          mkdir -p /tmp/gh-pages
          cp -r site/. /tmp/gh-pages/

          cd /tmp/gh-pages
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy Demo"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
