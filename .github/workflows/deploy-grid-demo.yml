name: Deploy Grid Demo

on:
  push:
    branches:
      - main
    paths:
      - 'CloudComponents.Grid.Demo/**'
      - 'CloudComponents.Grid/**'
      - 'CloudComponents.Icons/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Grid demo
        run: dotnet publish CloudComponents.Grid.Demo/CloudComponents.Grid.Demo.csproj -c Release -o publish

      - name: Prepare GitHub Pages assets
        shell: bash
        run: |
          cp publish/wwwroot/index.html publish/wwwroot/404.html

          cat > /tmp/gh-pages-index-snippet.html <<'EOF'
          <script>
            (function(l) {
              if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function(s) {
                  return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                  l.pathname.slice(0, -1) + decoded + l.hash
                );
              }
            }(window.location))
          </script>
          EOF

          cat > /tmp/gh-pages-404-snippet.html <<'EOF'
          <script>
            var pathSegmentsToKeep = 1;
            var l = window.location;
            l.replace(
              l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
              l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
              l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
              (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
              l.hash
            );
          </script>
          EOF

          python3 <<'PY'
          from pathlib import Path

          index_path = Path('publish/wwwroot/index.html')
          not_found_path = Path('publish/wwwroot/404.html')
          index_snippet = Path('/tmp/gh-pages-index-snippet.html').read_text()
          not_found_snippet = Path('/tmp/gh-pages-404-snippet.html').read_text()

          def update_html(path: Path, snippet: str) -> None:
              content = path.read_text()
              content = content.replace('<head>', f'<head>\n{snippet}', 1)
              content = content.replace('<base href="/" />', '<base href="/CloudComponents/" />', 1)
              path.write_text(content)

          update_html(index_path, index_snippet)
          update_html(not_found_path, not_found_snippet)
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: github-pages # Reminder: set Settings > Pages > Source to GitHub Actions.

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
